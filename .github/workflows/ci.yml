name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        working-directory: apps/api
        run: pip install -r requirements-dev.txt
      - name: Run API tests
        working-directory: apps/api
        run: pytest

  worker-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install worker dependencies
        working-directory: apps/worker
        run: pip install -r requirements-dev.txt
      - name: Run worker tests
        working-directory: apps/worker
        run: pytest

  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
      - name: Install web dependencies
        working-directory: apps/web
        run: npm install
      - name: Build web
        working-directory: apps/web
        run: npm run build

  infra-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Docker Compose config
        run: |
          cp .env.example .env
          docker compose -f infra/docker/docker-compose.yml config >/tmp/compose-config.yml
          rm .env
      - name: Validate Kubernetes YAML
        run: |
          ruby -e 'require "yaml"; ARGV.each { |f| YAML.load_stream(File.read(f)); puts "ok #{f}" }' infra/k8s/*.yaml
