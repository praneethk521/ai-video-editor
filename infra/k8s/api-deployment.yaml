apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-video-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-video-api
  template:
    metadata:
      labels:
        app: ai-video-api
    spec:
      containers:
        - name: api
          image: ghcr.io/OWNER/ai-video-editor-api:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: ai-video-api-secrets
          env:
            - name: OUTPUT_DELIVERY_LOCAL_ROOT
              value: /tmp/ai-video-editor/outputs
            - name: LOCAL_PRIVATE_DELIVERY_ROOT
              value: /tmp/ai-video-editor/delivered
          volumeMounts:
            - name: output-staging
              mountPath: /tmp/ai-video-editor
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: output-staging
          persistentVolumeClaim:
            claimName: ai-video-output-staging
---
apiVersion: v1
kind: Service
metadata:
  name: ai-video-api
spec:
  selector:
    app: ai-video-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-video-output-staging
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
