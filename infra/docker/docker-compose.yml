services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: video
      POSTGRES_PASSWORD: video
      POSTGRES_DB: video_editor
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video -d video_editor"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"

  clamav:
    image: clamav/clamav:1.4
    ports:
      - "3310:3310"
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 10

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      clamav:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    env_file:
      - ../../.env
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      - redis
    read_only: true
    tmpfs:
      - /tmp:size=4g,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  n8n:
    image: n8nio/n8n:1.73.1
    env_file:
      - ../../.env
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      N8N_SECURE_COOKIE: false
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_DATABASE: video_editor
      DB_POSTGRESDB_USER: video
      DB_POSTGRESDB_PASSWORD: video
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n

volumes:
  postgres-data:
  n8n-data:
